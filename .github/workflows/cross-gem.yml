name: Cross Gem

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  cross_gem:
    name: Build native gem for ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux
          - x86_64-linux-musl
          - aarch64-linux
          - aarch64-linux-musl
          - x86_64-darwin
          - arm64-darwin
          - x64-mingw-ucrt

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build gem for ${{ matrix.platform }}
        id: cross-gem
        uses: oxidize-rb/actions/cross-gem@v1
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.1,3.2,3.3,3.4,4.0"

      - uses: actions/upload-artifact@v4
        with:
          name: cross-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}
          if-no-files-found: error

  release:
    name: Push gems to RubyGems.org
    needs: cross_gem
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Build source gem
        run: bundle exec rake build

      - uses: actions/download-artifact@v4
        with:
          pattern: cross-gem-*
          path: pkg
          merge-multiple: true

      - uses: rubygems/configure-rubygems-credentials@v2

      - name: Push gems
        run: |
          for gem in pkg/*.gem; do
            if output=$(gem push "$gem" 2>&1); then
              echo "$output"
            elif echo "$output" | grep -q "Repushing of gem versions is not allowed"; then
              echo "Skipping $gem (already pushed)"
            else
              echo "$output"
              exit 1
            fi
          done
